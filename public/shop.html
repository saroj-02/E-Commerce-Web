<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Collection</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">AURA</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/shop.html" style="color: var(--primary)">Shop</a>
            <a href="/cart.html">Cart</a>
        </div>
        <div class="nav-actions" id="auth-links">
            <!-- Auth injected here -->
        </div>
    </nav>

    <div class="container" style="padding-top: 120px;">
        <h1 class="playfair" style="font-size: 3rem; margin-bottom: 2rem;">The Collection</h1>
        
        <div class="product-grid" id="all-products">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-image-container">
                <img id="modal-img" class="modal-image" src="" alt="" style="width:100%; height:100%; object-fit:cover;">
                <div class="thumbnail-strip" id="modal-thumbnails">
                    <!-- Thumbnails injected here -->
                </div>
            </div>
            <div class="modal-details">
                <div class="rating-stars" id="modal-rating"></div>
                <h1 id="modal-title" class="playfair"></h1>
                <p id="modal-category" style="color: var(--primary); font-weight: 600; margin: 0.5rem 0 1.5rem;"></p>
                <p id="modal-desc" style="color: var(--text-muted); line-height: 1.8;"></p>
                
                <ul class="feature-list" id="modal-features"></ul>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
                    <span id="modal-price" class="product-price" style="font-size: 1.8rem;"></span>
                    <button id="modal-add-btn" class="btn btn-primary">Add to Collection</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/store.js"></script>
    <script>
        let allProducts = [];
        async function loadAllProducts() {
            const products = await window.api.get('/products');
            allProducts = products;
            const grid = document.getElementById('all-products');
            grid.innerHTML = products.map((p, i) => {
                const isLiked = window.store.user?.wishlist?.includes(p._id);
                return `
                <div class="product-card glass reveal" style="animation-delay: ${0.1 * i}s" onclick="openProduct('${p._id}')">
                    <button onclick="toggleLike(event, '${p._id}')" class="like-btn ${isLiked ? 'liked' : ''}" id="like-${p._id}">
                        <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i>
                    </button>
                    <img src="${p.image_url}" class="product-image" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=800&q=80'">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p style="color: var(--text-muted); margin-bottom: 1rem;">${p.category}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="product-price">$${p.price.toLocaleString()}</span>
                            <button onclick="handleAddToCart(event, '${p._id}')" class="btn btn-primary" style="padding: 0.5rem 1.5rem;">Add</button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        async function handleAddToCart(e, id, isModal = false) {
            if (e) e.stopPropagation();
            const success = await window.store.addToCart(id);
            if (success) {
                const btn = isModal ? document.getElementById('modal-add-btn') : e.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Added';
                btn.classList.add('added');
                btn.disabled = true;
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('added');
                    btn.disabled = false;
                }, 2000);
            }
        }

        const modal = document.getElementById('product-modal');
        function openProduct(id) {
            const p = allProducts.find(x => x._id === id);
            if (!p) return;

            document.getElementById('modal-img').src = p.image_url;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-category').innerText = p.category;
            document.getElementById('modal-desc').innerText = p.description;
            document.getElementById('modal-price').innerText = `$${p.price.toLocaleString()}`;
            
            // Thumbnails
            const thumbContainer = document.getElementById('modal-thumbnails');
            const images = p.images && p.images.length > 0 ? p.images : [p.image_url];
            thumbContainer.innerHTML = images.map((img, i) => `
                <img src="${img}" class="thumbnail ${i === 0 ? 'active' : ''}" 
                     onclick="switchModalImage(this, '${img}')">
            `).join('');

            // Rating
            const ratingHtml = Array(5).fill(0).map((_, i) => 
                `<i class="fa-${i < Math.floor(p.ratings ?? 4.5) ? 'solid' : 'regular'} fa-star"></i>`
            ).join('') + `<span style="margin-left: 0.5rem; color: var(--text-muted)">(${p.reviewsCount ?? 128} Reviews)</span>`;
            document.getElementById('modal-rating').innerHTML = ratingHtml;

            // Features
            const features = p.features || ['Premium Build Quality', 'Sustainable Materials', 'Exclusive Design', '2-Year Warranty'];
            document.getElementById('modal-features').innerHTML = features.map(f => 
                `<li><i class="fa-solid fa-circle-check"></i> ${f}</li>`
            ).join('');

            document.getElementById('modal-add-btn').onclick = () => handleAddToCart(null, p._id, true);

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function switchModalImage(el, src) {
            document.getElementById('modal-img').src = src;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        document.querySelector('.close-modal').onclick = () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onclick = (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        async function toggleLike(e, id) {
            e.stopPropagation();
            const liked = await window.store.toggleWishlist(id);
            const btn = document.getElementById(`like-${id}`);
            btn.classList.toggle('liked', liked);
            btn.innerHTML = `<i class="fa-${liked ? 'solid' : 'regular'} fa-heart"></i>`;
        }

        loadAllProducts();
    </script>
    
    <footer class="site-footer">
        <div class="footer-anim"></div>
        <div class="footer-content">
            <div class="footer-credit">Designed & Developed by <a href="https://www.linkedin.com/in/saroj-padhi-492979270" target="_blank" rel="noopener">Saroj Padhi</a></div>
            <div class="footer-links">
                <a href="https://www.github.com/saroj-02" target="_blank" rel="noopener">GitHub</a>
                <a href="https://portfolio-8-4qo4.onrender.com/" target="_blank" rel="noopener">Portfolio</a>
            </div>
        </div>
    </footer>
    <style>
        .btn-primary.added {
            background: #2ecc71;
            border-color: #2ecc71;
        }
        .btn-outline.added {
            background: #2ecc71;
            color: white;
            border-color: #2ecc71;
        }
    </style>
</body>
</html>
